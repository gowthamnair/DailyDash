<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch Up Dashboard</title>
    <style>
        :root {
            --glass-bg: rgba(30, 30, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --ios-blur: blur(24px) saturate(180%);
            --accent: #007aff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #000000 50%, #1e1b4b 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* No page scrolling */
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        /* Hide Scrollbars everywhere but allow scroll functionality inside feeds */
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 5%;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
        }

        #timestamp {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            width: 33%;
        }

        #title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            width: 33%;
        }

        #spacer {
            width: 33%;
        }

        /* Main Grid Layout */
        main {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: minmax(0, 1.2fr) minmax(0, 0.8fr);
            gap: 1.5rem;
            height: 90%;
            width: 100%;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Grid Positions */
        .reddit-widget { grid-column: 1 / 5; grid-row: 1; }
        .news-widget { grid-column: 5 / 9; grid-row: 1; }
        .social-widget { grid-column: 9 / 13; grid-row: 1; }
        
        .stock-widget { grid-column: 1 / 6; grid-row: 2; }
        .crypto-widget { grid-column: 6 / 11; grid-row: 2; }
        .weather-widget { grid-column: 11 / 13; grid-row: 2; display: flex; align-items: center; justify-content: center; background: rgba(30, 30, 35, 0.6); }

        /* Widget Specific Overrides to ensure 100% fill */
        .tradingview-widget-container {
            height: 100% !important;
            width: 100% !important;
        }
        rssapp-carousel {
            height: 100%;
            width: 100%;
        }
        
        /* Specific Fix for Social Widget internal scrolling */
        .social-widget {
            overflow-y: auto;
        }

        /* --- REDDIT WIDGET SPECIFIC STYLES --- */
        .reddit-inner {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 1rem;
            width: 100%;
            border: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 6px 4px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        #news-feed {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .news-card {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .news-card:active { transform: scale(0.98); }

        .thumb {
            width: 60px;
            height: 60px;
            min-width: 60px;
            border-radius: 10px;
            object-fit: cover;
            background: #1a1a1a;
            margin-right: 12px;
        }

        .content { flex: 1; overflow: hidden; }

        .content-title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            margin: 0 0 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 500;
            text-transform: uppercase;
        }

        .loader {
            text-align: center;
            margin-top: 20px;
            color: var(--text-dim);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div id="timestamp">--:--</div>
        <div id="title">Catch Up</div>
        <div id="spacer"></div>
    </header>

    <main>
        <!-- Reddit Widget -->
        <div class="glass-panel reddit-widget">
            <div class="reddit-inner">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('technology', this)">Tech</button>
                    <button class="tab-btn" onclick="switchTab('singularity', this)">Singularity</button>
                    <button class="tab-btn" onclick="switchTab('news', this)">News</button>
                    <button class="tab-btn" onclick="switchTab('popular', this)">Popular</button>
                </div>
                <div id="news-feed">
                    <div class="loader">Loading updates...</div>
                </div>
            </div>
        </div>

        <!-- News Widget -->
        <div class="glass-panel news-widget">
            <rssapp-carousel id="YG86rQCuDxlIrwjH"></rssapp-carousel>
            <script src="https://widget.rss.app/v1/carousel.js" type="text/javascript" async></script>
        </div>

        <!-- Social / Sports Widget -->
        <div class="glass-panel social-widget">
            <a class="twitter-timeline" data-theme="dark" href="https://twitter.com/spectatorindex?ref_src=twsrc%5Etfw">Tweets by spectatorindex</a> 
            <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
        </div>

        <!-- Stock Tile -->
        <div class="glass-panel stock-widget">
            <!-- TradingView Widget BEGIN -->
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                {
                    "dataSource": "SPX500",
                    "blockSize": "market_cap_basic",
                    "blockColor": "change",
                    "grouping": "sector",
                    "locale": "en",
                    "symbolUrl": "",
                    "colorTheme": "dark",
                    "exchanges": [],
                    "hasTopBar": false,
                    "isDataSetEnabled": false,
                    "isZoomEnabled": true,
                    "hasSymbolTooltip": true,
                    "isMonoSize": false,
                    "width": "100%",
                    "height": "100%"
                }
                </script>
            </div>
            <!-- TradingView Widget END -->
        </div>

        <!-- Crypto Tile -->
        <div class="glass-panel crypto-widget">
            <!-- TradingView Widget BEGIN -->
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js" async>
                {
                    "dataSource": "Crypto",
                    "blockSize": "market_cap_calc",
                    "blockColor": "24h_close_change|5",
                    "locale": "en",
                    "symbolUrl": "",
                    "colorTheme": "dark",
                    "hasTopBar": false,
                    "isDataSetEnabled": false,
                    "isZoomEnabled": true,
                    "hasSymbolTooltip": true,
                    "isMonoSize": false,
                    "width": "100%",
                    "height": "100%"
                }
                </script>
            </div>
            <!-- TradingView Widget END -->
        </div>

        <!-- Weather Tile -->
        <div class="glass-panel weather-widget">
            <a class="weatherwidget-io" href="https://forecast7.com/en/25d2055d27/dubai/" data-label_1="DUBAI" data-label_2="WEATHER" data-mode="Current" data-theme="dark" style="width: 100%; pointer-events: none;">DUBAI WEATHER</a>
            <script>
            !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
            </script>
        </div>
    </main>

    <script>
        // --- Clock Logic ---
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('timestamp').innerText = now.toLocaleDateString('en-US', options).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Reddit Widget Logic ---
        const USER = 'gowthamnair';
        const REPO = 'CatchUp';

        async function fetchNews(sub) {
            const container = document.getElementById('news-feed');
            const url = `https://${USER}.github.io/${REPO}/${sub}.json?v=${Date.now()}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Resource not found');
                
                const articles = await response.json();
                renderUI(articles, sub);
            } catch (err) {
                container.innerHTML = `
                    <div class="loader">
                        <p style="color: #ff453a;">Failed to load data</p>
                    </div>`;
            }
        }

        function renderUI(articles, sub) {
            const container = document.getElementById('news-feed');
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="loader">No posts found.</div>';
                return;
            }

            container.innerHTML = articles.map(item => `
                <a href="${item.link}" target="_blank" class="news-card">
                    <img src="${item.image}" class="thumb" onerror="this.src='https://via.placeholder.com/150x150?text=No+Image'">
                    <div class="content">
                        <h3 class="content-title">${item.title}</h3>
                        <div class="meta">r/${sub} • ${item.published}</div>
                    </div>
                </a>
            `).join('');
        }

        function switchTab(sub, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            container = document.getElementById('news-feed').innerHTML = '<div class="loader">Loading updates...</div>';
            fetchNews(sub);
        }

        // Initialize Reddit Widget
        fetchNews('technology');
    </script>
</body>
</html>
