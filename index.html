<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyDash</title>
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #000000 50%, #1e1b4b 100%);
            --glass-bg: rgba(30, 30, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --ios-blur: blur(24px) saturate(180%);
            --accent: #007aff;
            --panel-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            --panel-shadow-hover: 0 16px 32px rgba(0, 0, 0, 0.4);
            --tab-bg: rgba(255, 255, 255, 0.05);
            --tab-active-bg: rgba(255, 255, 255, 0.15);
            --card-bg: rgba(0, 0, 0, 0.2);
            --card-border: rgba(255, 255, 255, 0.05);
        }

        body.light-theme {
            /* Light Theme */
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-dim: rgba(15, 23, 42, 0.6);
            --panel-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            --panel-shadow-hover: 0 16px 32px rgba(0, 0, 0, 0.12);
            --tab-bg: rgba(0, 0, 0, 0.05);
            --tab-active-bg: rgba(0, 0, 0, 0.12);
            --card-bg: rgba(255, 255, 255, 0.5);
            --card-border: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            transition: background 0.4s ease, color 0.4s ease;
        }

        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 5%;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
            flex-shrink: 0;
        }

        #datetime-weather {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            width: 33%;
            white-space: nowrap;
        }

        #title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            text-align: center;
            width: 33%;
        }

        #spacer {
            width: 33%;
            display: flex;
            justify-content: flex-end;
        }

        /* Minimal Theme Toggle */
        #theme-toggle {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #theme-toggle:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        .theme-icon {
            width: 16px;
            height: 16px;
            stroke-width: 1.5;
        }

        body.light-theme .sun-icon { display: none; }
        body:not(.light-theme) .moon-icon { display: none; }

        /* Modal Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Widget Architecture */
        .widget-box {
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            min-height: 0;
            min-width: 0;
        }

        /* Expanded Widget State */
        .widget-box.expanded {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            max-width: 1000px;
            max-height: 800px;
            z-index: 1000;
            margin: 0;
        }

        .widget-controls {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 8px;
            height: 24px;
        }

        .widget-controls.tabbed-controls {
            justify-content: space-between;
        }

        .expand-btn {
            background: var(--tab-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            border-radius: 4px; /* Reduced from 8px */
            width: 18px; /* Reduced to be very small */
            height: 18px; /* Reduced to be very small */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .expand-btn:hover {
            background: var(--tab-active-bg);
            color: var(--text-main);
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--panel-shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            flex: 1;
            transition: box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .widget-box:not(.expanded) .glass-panel:hover {
            box-shadow: var(--panel-shadow-hover);
        }

        .tradingview-widget-container { height: 100% !important; width: 100% !important; }

        /* --- REDDIT & NEWS TABS SPECIFIC STYLES --- */
        .tabs {
            display: flex;
            background: var(--tab-bg);
            padding: 2px; /* Reduced */
            border-radius: 8px; /* Reduced */
            flex: 1;
            margin-right: 8px;
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 4px 6px; /* Reduced */
            border-radius: 6px; /* Reduced */
            cursor: pointer;
            font-weight: 600;
            font-size: 9px; /* Reduced size */
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--text-main);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .reddit-content {
            flex: 1;
            padding: 1rem;
        }

        #news-feed {
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .news-card {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 8px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .news-card:active { transform: scale(0.97); }

        .thumb {
            width: 45px;
            height: 45px;
            min-width: 45px;
            border-radius: 10px;
            object-fit: cover;
            background: #1a1a1a;
            margin-right: 12px;
        }

        .content { flex: 1; overflow: hidden; }

        .content-title {
            font-size: 11px;
            font-weight: 600;
            line-height: 1.3;
            margin: 0 0 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            font-size: 8px;
            color: var(--text-dim);
            font-weight: 500;
            text-transform: uppercase;
        }

        .loader {
            text-align: center;
            margin-top: 20px;
            color: var(--text-dim);
            font-size: 11px;
        }

        /* --- GLOBAL WIRE WIDGET SPECIFIC STYLES --- */
        #global-wire-feed {
            height: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            flex-direction: row;
            gap: 12px;
            padding: 12px;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        #global-wire-feed::-webkit-scrollbar { display: none; }

        .hero-card {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: unset;
            flex: 0 0 calc(100% - 24px);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--card-border);
            transition: transform 0.2s ease;
            scroll-snap-align: center;
        }

        .widget-box.expanded .hero-card {
            height: 100%;
            min-height: unset;
        }

        .hero-card:active { transform: scale(0.98); }

        .card-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; object-position: center; z-index: 1;
            background-color: #1a1a1a;
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 20%, rgba(0,0,0,0.9) 100%);
            z-index: 2;
        }

        .card-content {
            position: absolute;
            bottom: 0; left: 0; padding: 14px; z-index: 3;
            width: 100%; box-sizing: border-box;
        }

        .hero-title {
            font-size: 13px; font-weight: 700; line-height: 1.3; margin: 0 0 4px 0;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .hero-meta {
            font-size: 9px; color: rgba(255,255,255,0.8); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
        }

        .icon { width: 10px; height: 10px; stroke-width: 2.5; } /* Scaled down inner icon */

        /* Responsive Breakpoints & Layout Logic */
        .mobile-dots { display: none; } /* Hidden on desktop */

        /* Scale down TradingView iframe contents to reduce perceived font size */
        #stock-container iframe {
            transform: scale(0.85);
            transform-origin: top left;
            width: 117.64% !important; /* 100 / 0.85 */
            height: 117.64% !important;
        }

        /* DESKTOP VIEW */
        @media (min-width: 768px) {
            main {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: 1.5rem;
                height: 90%;
                width: 100%;
            }
            /* Explicit Positioning - Reddit Left (1), News Right (2) */
            #reddit-box { grid-column: 1; grid-row: 1; }
            #news-box { grid-column: 2; grid-row: 1; }
            #stock-box { grid-column: 1; grid-row: 2; }
            #crypto-box { grid-column: 2; grid-row: 2; }
        }

        /* MOBILE VIEW (SWIPE CAROUSEL) */
        @media (max-width: 767px) {
            body { padding: 1rem 0 0 0; }
            
            /* Fix Header Overlap on Mobile */
            header { 
                padding: 0 1rem; 
                margin-bottom: 1rem; 
            }
            #datetime-weather {
                font-size: 0.6rem;
                width: auto;
                flex: 1;
                white-space: normal; /* Allow wrapping */
                line-height: 1.2;
            }
            #title {
                font-size: 1rem;
                width: auto;
                flex: 0 0 auto;
                margin: 0 8px; /* Buffer space */
            }
            #spacer {
                width: auto;
                flex: 1;
            }

            main {
                display: flex;
                flex-direction: row;
                height: calc(100vh - 100px); /* Fill remaining space */
                width: 100vw;
                overflow-x: auto;
                overflow-y: hidden;
                scroll-snap-type: x mandatory;
                scroll-behavior: smooth;
                gap: 0;
                padding: 0;
            }
            
            .widget-box {
                flex: 0 0 100vw;
                width: 100vw;
                height: 100%;
                scroll-snap-align: center;
                padding: 0 1.5rem 2rem 1.5rem; /* Add padding at the bottom for dots */
                box-sizing: border-box;
            }

            /* Convert Mobile News Feed to Vertical Scrolling (Not Swipeable) */
            #global-wire-feed {
                flex-direction: column;
                overflow-x: hidden;
                overflow-y: auto;
                scroll-snap-type: none; /* Disable horizontal snapping */
            }
            .hero-card {
                flex: 0 0 auto;
                height: 160px;
                width: 100%;
            }

            .expand-btn { display: none; } /* Hide expand button on mobile since it's full screen */

            /* Mobile Pagination Dots */
            .mobile-dots {
                display: flex;
                flex-direction: row; /* Horizontal alignment */
                position: fixed;
                bottom: 8px; /* Moved to bottom */
                top: auto;
                left: 50%;
                transform: translateX(-50%); /* Centered */
                right: auto;
                gap: 8px;
                z-index: 50;
                background: rgba(0,0,0,0.2);
                padding: 6px 10px;
                border-radius: 12px;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.1);
            }
            .dot {
                width: 6px; height: 6px; border-radius: 50%;
                background: rgba(255,255,255,0.3); transition: transform 0.3s, background 0.3s;
            }
            .dot.active {
                background: rgba(255,255,255,0.9);
                transform: scale(1.4);
            }
            body.light-theme .mobile-dots { background: rgba(255,255,255,0.4); border: 1px solid rgba(0,0,0,0.1); }
            body.light-theme .dot { background: rgba(0,0,0,0.3); }
            body.light-theme .dot.active { background: rgba(0,0,0,0.8); }
        }
    </style>
</head>
<body>

    <header>
        <div id="datetime-weather">--:-- | Locating...</div>
        <div id="title">DailyDash</div>
        <div id="spacer">
            <button id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                <svg class="theme-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="theme-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <div id="overlay"></div>

    <div class="mobile-dots">
        <div class="dot active" data-target="news-box"></div>
        <div class="dot" data-target="reddit-box"></div>
        <div class="dot" data-target="stock-box"></div>
        <div class="dot" data-target="crypto-box"></div>
    </div>

    <!-- DOM order defines swipe sequence: News -> Reddit -> Stock -> Crypto -->
    <main id="scroll-container">
        
        <!-- News Widget (Mobile 1, Desktop Right) -->
        <div class="widget-box" id="news-box">
            <div class="widget-controls tabbed-controls">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchGlobalWireTab('bbc', this)">BBC</button>
                    <button class="tab-btn" onclick="switchGlobalWireTab('reuters', this)">Reuters</button>
                    <button class="tab-btn" onclick="switchGlobalWireTab('ap', this)">AP</button>
                    <button class="tab-btn" onclick="switchGlobalWireTab('afp', this)">AFP</button>
                </div>
                <button class="expand-btn" onclick="toggleExpand('news-box')" title="Expand">
                    <svg class="icon expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
            <div class="glass-panel">
                <div id="global-wire-feed">
                    <div class="loader">Accessing data...</div>
                </div>
            </div>
        </div>

        <!-- Reddit Widget (Mobile 2, Desktop Left) -->
        <div class="widget-box" id="reddit-box">
            <div class="widget-controls tabbed-controls">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('technology', this)">Tech</button>
                    <button class="tab-btn" onclick="switchTab('singularity', this)">Singularity</button>
                    <button class="tab-btn" onclick="switchTab('news', this)">News</button>
                    <button class="tab-btn" onclick="switchTab('popular', this)">Popular</button>
                </div>
                <button class="expand-btn" onclick="toggleExpand('reddit-box')" title="Expand">
                    <svg class="icon expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
            <div class="glass-panel reddit-content">
                <div id="news-feed">
                    <div class="loader">Loading updates...</div>
                </div>
            </div>
        </div>

        <!-- Stock Tile (Mobile 3, Desktop Left) -->
        <div class="widget-box" id="stock-box">
            <div class="widget-controls">
                <button class="expand-btn" onclick="toggleExpand('stock-box')" title="Expand">
                    <svg class="icon expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
            <div class="glass-panel" id="stock-container"></div>
        </div>

        <!-- Crypto Tile (Mobile 4, Desktop Right) -->
        <div class="widget-box" id="crypto-box">
            <div class="widget-controls">
                <button class="expand-btn" onclick="toggleExpand('crypto-box')" title="Expand">
                    <svg class="icon expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
            <div class="glass-panel" id="crypto-container"></div>
        </div>

    </main>

    <script>
        // --- Fallback Image Logic (Diverse placeholders) ---
        const fallbackImages = [
            'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1495020689067-958852a7765e?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1526470608159-0097f4802100?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1557428894-56bcc97113fe?auto=format&fit=crop&w=400&q=80'
        ];

        // --- Mobile Intersection Observer for Dots ---
        if (window.innerWidth < 768) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
                        const targetDot = document.querySelector(`.dot[data-target="${entry.target.id}"]`);
                        if (targetDot) targetDot.classList.add('active');
                    }
                });
            }, { threshold: 0.5, root: document.getElementById('scroll-container') });
            
            document.querySelectorAll('.widget-box').forEach(box => observer.observe(box));
        }

        // --- Expand / Modal Logic ---
        const expandIcon = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`;
        const closeIcon = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

        function toggleExpand(boxId) {
            const box = document.getElementById(boxId);
            const overlay = document.getElementById('overlay');
            const btn = box.querySelector('.expand-btn');
            
            if (box.classList.contains('expanded')) {
                box.classList.remove('expanded');
                overlay.classList.remove('active');
                btn.innerHTML = expandIcon;
            } else {
                document.querySelectorAll('.widget-box.expanded').forEach(w => {
                    w.classList.remove('expanded');
                    w.querySelector('.expand-btn').innerHTML = expandIcon;
                });
                box.classList.add('expanded');
                overlay.classList.add('active');
                btn.innerHTML = closeIcon;
            }
        }

        document.getElementById('overlay').addEventListener('click', () => {
            document.querySelectorAll('.widget-box.expanded').forEach(w => {
                w.classList.remove('expanded');
                w.querySelector('.expand-btn').innerHTML = expandIcon;
            });
            document.getElementById('overlay').classList.remove('active');
        });

        // --- Theme Logic ---
        let currentTheme = 'dark';

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            currentTheme = body.classList.contains('light-theme') ? 'light' : 'dark';
            loadTradingViewWidgets();
        }

        function loadTradingViewWidgets() {
            const configTpl = {
                "blockSize": "market_cap_basic",
                "locale": "en",
                "symbolUrl": "",
                "colorTheme": currentTheme,
                "hasTopBar": false,
                "isDataSetEnabled": false,
                "isZoomEnabled": true,
                "hasSymbolTooltip": true,
                "isMonoSize": false,
                "width": "100%",
                "height": "100%"
            };

            const stockContainer = document.getElementById('stock-container');
            stockContainer.innerHTML = '<div class="tradingview-widget-container" style="height:100%;width:100%"><div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div></div>';
            const stockScript = document.createElement('script');
            stockScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js';
            stockScript.async = true;
            stockScript.innerHTML = JSON.stringify({ ...configTpl, "dataSource": "SPX500", "blockColor": "change", "grouping": "sector", "exchanges": [] });
            stockContainer.querySelector('.tradingview-widget-container').appendChild(stockScript);

            const cryptoContainer = document.getElementById('crypto-container');
            cryptoContainer.innerHTML = '<div class="tradingview-widget-container" style="height:100%;width:100%"><div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div></div>';
            const cryptoScript = document.createElement('script');
            cryptoScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js';
            cryptoScript.async = true;
            cryptoScript.innerHTML = JSON.stringify({ ...configTpl, "dataSource": "Crypto", "blockSize": "market_cap_calc", "blockColor": "24h_close_change|5" });
            cryptoContainer.querySelector('.tradingview-widget-container').appendChild(cryptoScript);
        }

        // --- Clock & Dynamic Weather Logic ---
        let weatherString = "";

        async function fetchWeather() {
            const fetchMeteo = async (latitude, longitude, cityName) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    weatherString = ` | ${cityName}, ${Math.round(data.current_weather.temperature)} C`;
                    updateClock(); 
                } catch (err) {
                    weatherString = ` | ${cityName}, -- C`;
                    updateClock();
                }
            };

            const attemptGeoLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        let city = "Local";
                        try {
                            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                            if (geoRes.ok) {
                                const geoData = await geoRes.json();
                                city = geoData.address.city || geoData.address.town || geoData.address.village || city;
                            }
                        } catch (e) {}
                        fetchMeteo(pos.coords.latitude, pos.coords.longitude, city);
                    }, () => {
                         weatherString = " | Loc. Disabled";
                         updateClock();
                    });
                }
            };

            // Attempt IP Based Geolocation First (No Prompt)
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                if (ipRes.ok) {
                    const ipData = await ipRes.json();
                    if (ipData.latitude && ipData.city) {
                        fetchMeteo(ipData.latitude, ipData.longitude, ipData.city);
                    } else {
                        attemptGeoLocation();
                    }
                } else {
                    attemptGeoLocation();
                }
            } catch (e) {
                attemptGeoLocation();
            }
        }

        function updateClock() {
            const now = new Date();
            const datePart = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
            const timePart = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }).toUpperCase();
            document.getElementById('datetime-weather').innerText = `${datePart}, ${timePart}${weatherString}`;
        }
        
        setInterval(updateClock, 1000);
        updateClock();
        fetchWeather();

        // --- Reddit Widget Logic ---
        const USER = 'gowthamnair';
        const REPO = 'CatchUp';

        async function fetchNews(sub) {
            const container = document.getElementById('news-feed');
            const url = `https://${USER}.github.io/${REPO}/${sub}.json?v=${Date.now()}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const articles = await response.json();
                renderUI(articles, sub);
            } catch (err) {
                container.innerHTML = `<div class="loader"><p style="color: #ff453a;">Failed to load data</p></div>`;
            }
        }

        function renderUI(articles, sub) {
            const container = document.getElementById('news-feed');
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="loader">No posts found.</div>';
                return;
            }
            const seenImages = new Set();
            container.innerHTML = articles.map((item, index) => {
                let isValidImg = item.image && typeof item.image === 'string' && item.image !== 'null' && item.image.trim() !== '';
                
                if (isValidImg) {
                    if (seenImages.has(item.image)) isValidImg = false;
                    else seenImages.add(item.image);
                }

                const fallbackImg = fallbackImages[index % fallbackImages.length];
                const img = isValidImg ? item.image : fallbackImg;
                const fallbackAttr = `onerror="this.onerror=null; this.src='${fallbackImg}';"`;
                
                return `
                <a href="${item.link}" target="_blank" class="news-card">
                    <img src="${img}" class="thumb" ${fallbackAttr}>
                    <div class="content">
                        <h3 class="content-title">${item.title}</h3>
                        <div class="meta">r/${sub} • ${item.published}</div>
                    </div>
                </a>`;
            }).join('');
        }

        function switchTab(sub, btn) {
            const tabs = btn.closest('.tabs').querySelectorAll('.tab-btn');
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('news-feed').innerHTML = '<div class="loader">Loading updates...</div>';
            fetchNews(sub);
        }

        // --- Global Wire Widget Logic ---
        async function fetchGlobalWireNews(source) {
            const container = document.getElementById('global-wire-feed');
            const url = `https://${USER}.github.io/${REPO}/news_${source}.json?v=${Date.now()}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const articles = await response.json();
                renderGlobalWireUI(articles, source);
            } catch (err) {
                container.innerHTML = `<div class="loader">Unable to find <b>news_${source}.json</b>.<br><p style="font-size:11px;opacity:0.5;">Ensure GitHub Action successfully generated this file.</p></div>`;
            }
        }

        function renderGlobalWireUI(articles, source) {
            const container = document.getElementById('global-wire-feed');
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="loader">No posts found.</div>';
                return;
            }
            
            const seenImages = new Set();
            
            container.innerHTML = articles.slice(0, 10).map((item, index) => {
                let isValidImg = item.image && typeof item.image === 'string' && item.image !== 'null' && item.image.trim() !== '' && !item.image.includes('placeholder');
                
                if (isValidImg) {
                    if (seenImages.has(item.image)) {
                        isValidImg = false;
                    } else {
                        seenImages.add(item.image);
                    }
                }

                const fallbackImg = fallbackImages[index % fallbackImages.length];
                const img = isValidImg ? item.image : fallbackImg;
                const fallbackAttr = `onerror="this.onerror=null; this.src='${fallbackImg}';"`;
                
                return `
                <a href="${item.link}" target="_blank" class="hero-card">
                    <img src="${img}" class="card-bg" ${fallbackAttr}>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="hero-meta">${source.toUpperCase()} • ${item.published}</div>
                        <h3 class="hero-title">${item.title}</h3>
                    </div>
                </a>`;
            }).join('');
        }

        function switchGlobalWireTab(source, btn) {
            const tabs = btn.closest('.tabs').querySelectorAll('.tab-btn');
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('global-wire-feed').innerHTML = '<div class="loader">Accessing data...</div>';
            fetchGlobalWireNews(source);
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadTradingViewWidgets();
            fetchNews('technology');
            fetchGlobalWireNews('bbc');
        });
    </script>
