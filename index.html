<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyDash</title>
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #000000 50%, #1e1b4b 100%);
            --glass-bg: rgba(30, 30, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --ios-blur: blur(24px) saturate(180%);
            --accent: #007aff;
            --panel-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            --panel-shadow-hover: 0 16px 32px rgba(0, 0, 0, 0.4);
            --overlay-bg: rgba(0, 0, 0, 0.5);
            --overlay-active-bg: rgba(255, 255, 255, 0.15);
            --card-bg: rgba(0, 0, 0, 0.2);
            --card-border: rgba(255, 255, 255, 0.05);
        }

        body.light-theme {
            /* Light Theme */
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-dim: rgba(15, 23, 42, 0.6);
            --panel-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            --panel-shadow-hover: 0 16px 32px rgba(0, 0, 0, 0.12);
            --overlay-bg: rgba(255, 255, 255, 0.7);
            --overlay-active-bg: rgba(0, 0, 0, 0.12);
            --card-bg: rgba(255, 255, 255, 0.5);
            --card-border: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            transition: background 0.4s ease, color 0.4s ease;
        }

        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 5%;
            margin-bottom: 1.5rem;
            padding: 0 1rem;
            flex-shrink: 0;
        }

        #datetime-weather {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            width: 33%;
            white-space: nowrap;
        }

        #title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            text-align: center;
            width: 33%;
        }

        #spacer {
            width: 33%;
            display: flex;
            justify-content: flex-end;
        }

        #theme-toggle {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #theme-toggle:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        .theme-icon { width: 16px; height: 16px; stroke-width: 1.5; }
        body.light-theme .sun-icon { display: none; }
        body:not(.light-theme) .moon-icon { display: none; }

        /* Modal Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Widget Architecture */
        .widget-box {
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
            min-width: 0;
        }

        /* Expanded Widget State */
        .widget-box.expanded {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            max-width: 1000px;
            max-height: 800px;
            z-index: 1000;
            margin: 0;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--panel-shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            flex: 1;
            transition: box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .widget-box:not(.expanded) .glass-panel:hover {
            box-shadow: var(--panel-shadow-hover);
        }

        /* Overlay Controls (Floating over content) */
        .overlay-controls {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            pointer-events: none; /* Let clicks pass through empty space */
        }

        .overlay-controls.end { justify-content: flex-end; }

        .tabs, .actions {
            pointer-events: auto;
            display: flex;
            gap: 4px;
        }

        .tabs {
            background: var(--overlay-bg);
            padding: 2px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-main);
            opacity: 0.6;
            padding: 4px 6px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 9px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--overlay-active-bg);
            opacity: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .icon-btn {
            background: var(--overlay-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            opacity: 0.8;
            border-radius: 6px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.2s ease;
            flex-shrink: 0;
            pointer-events: auto;
        }

        .icon-btn:hover {
            background: var(--overlay-active-bg);
            opacity: 1;
        }

        .icon { width: 12px; height: 12px; stroke-width: 2; }
        
        /* Layout Toggle Button Logic */
        .toggle-layout-btn.showing-card .card-icon { display: none; }
        .toggle-layout-btn.showing-card .list-icon { display: block; }
        .toggle-layout-btn.showing-list .list-icon { display: none; }
        .toggle-layout-btn.showing-list .card-icon { display: block; }

        /* Unified Feed Styling (Handles both List and Card Views) */
        .feed-container {
            height: 100%;
            display: flex;
            overflow: hidden;
        }

        .article-item {
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .article-item:active { transform: scale(0.98); }

        .article-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-color: #1a1a1a;
        }

        /* --- LIST VIEW --- */
        .view-list { 
            flex-direction: column; 
            overflow-y: auto;
            overflow-x: hidden;
            gap: 12px;
            padding: 12px;
            padding-top: 48px; /* Offset for floating controls */
        }
        .view-list .article-item {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
        }
        .view-list .img-wrapper {
            width: 45px; height: 45px; min-width: 45px;
            border-radius: 10px; overflow: hidden; margin-right: 12px;
        }
        .view-list .article-overlay { display: none; }
        .view-list .article-content { flex: 1; overflow: hidden; }
        .view-list .article-title {
            font-size: 11px; font-weight: 600; line-height: 1.3; margin: 0 0 4px 0;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .view-list .article-meta {
            font-size: 8px; color: var(--text-dim); font-weight: 500; text-transform: uppercase;
        }

        /* --- CARD VIEW --- */
        .view-card { 
            flex-direction: row; 
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 0; /* Fully flush with widget edges */
            gap: 0;
        }
        .view-card::-webkit-scrollbar { display: none; }
        .view-card .article-item { 
            position: relative; 
            height: 100%; 
            width: 100%; 
            flex: 0 0 100%; /* Takes full 100% of widget */
            scroll-snap-align: center;
            border-radius: 0;
            border: none;
        }
        .view-card .img-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .view-card .article-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* Gradient darkens slightly at top so floating icons remain visible */
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0.9) 100%); z-index: 2;
        }
        .view-card .article-content {
            position: absolute; bottom: 0; left: 0; padding: 24px 16px; z-index: 3; width: 100%; box-sizing: border-box;
        }
        .view-card .article-title {
            font-size: 15px; font-weight: 700; line-height: 1.3; margin: 0 0 6px 0;
            color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .view-card .article-meta {
            font-size: 10px; color: rgba(255,255,255,0.8); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
        }

        /* TradingView Specific */
        .tradingview-widget-container { height: 100% !important; width: 100% !important; }
        #stock-container iframe {
            transform: scale(0.85);
            transform-origin: top left;
            width: 117.64% !important;
            height: 117.64% !important;
        }
        #stock-container, #crypto-container { padding: 0; } 

        .loader { text-align: center; padding-top: 60px; color: var(--text-dim); font-size: 11px; width: 100%; }
        .mobile-dots { display: none; }

        /* DESKTOP VIEW */
        @media (min-width: 768px) {
            main {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: 1.5rem;
                height: 90%;
                width: 100%;
            }
            #news-box { grid-column: 1; grid-row: 1; }
            #reddit-box { grid-column: 2; grid-row: 1; }
            #stock-box { grid-column: 1; grid-row: 2; }
            #crypto-box { grid-column: 2; grid-row: 2; }
        }

        /* MOBILE VIEW */
        @media (max-width: 767px) {
            body { padding: 1rem 0 0 0; }
            header { padding: 0 1rem; margin-bottom: 1rem; }
            #datetime-weather { font-size: 0.6rem; width: auto; flex: 1; white-space: normal; line-height: 1.2; }
            #title { font-size: 1rem; width: auto; flex: 0 0 auto; margin: 0 8px; }
            #spacer { width: auto; flex: 1; }

            main {
                display: flex;
                flex-direction: row;
                height: calc(100vh - 100px);
                width: 100vw;
                overflow-x: auto;
                overflow-y: hidden;
                scroll-snap-type: x mandatory;
                scroll-behavior: smooth;
                gap: 0;
                padding: 0;
            }
            
            .widget-box {
                flex: 0 0 100vw;
                width: 100vw;
                height: 100%;
                scroll-snap-align: center;
                padding: 0 1.5rem 2rem 1.5rem;
                box-sizing: border-box;
            }

            .expand-btn { display: none; }

            .mobile-dots {
                display: flex;
                flex-direction: row;
                position: fixed;
                bottom: 8px;
                top: auto;
                left: 50%;
                transform: translateX(-50%);
                right: auto;
                gap: 8px;
                z-index: 50;
                background: rgba(0,0,0,0.2);
                padding: 6px 10px;
                border-radius: 12px;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.1);
            }
            .dot {
                width: 6px; height: 6px; border-radius: 50%;
                background: rgba(255,255,255,0.3); transition: transform 0.3s, background 0.3s;
            }
            .dot.active { background: rgba(255,255,255,0.9); transform: scale(1.4); }
            body.light-theme .mobile-dots { background: rgba(255,255,255,0.4); border: 1px solid rgba(0,0,0,0.1); }
            body.light-theme .dot { background: rgba(0,0,0,0.3); }
            body.light-theme .dot.active { background: rgba(0,0,0,0.8); }
        }
    </style>
</head>
<body>

    <header>
        <div id="datetime-weather">--:-- | Locating...</div>
        <div id="title">DailyDash</div>
        <div id="spacer">
            <button id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                <svg class="theme-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="theme-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <div id="overlay"></div>

    <div class="mobile-dots">
        <div class="dot active" data-target="news-box"></div>
        <div class="dot" data-target="reddit-box"></div>
        <div class="dot" data-target="stock-box"></div>
        <div class="dot" data-target="crypto-box"></div>
    </div>

    <main id="scroll-container">
        
        <!-- News Widget -->
        <div class="widget-box" id="news-box">
            <div class="glass-panel">
                <div class="overlay-controls">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchGlobalWireTab('bbc', this)">BBC</button>
                        <button class="tab-btn" onclick="switchGlobalWireTab('cnn', this)">CNN</button>
                    </div>
                    <div class="actions">
                        <button class="icon-btn toggle-layout-btn showing-card" onclick="toggleLayout('global-wire-feed', this)" title="Toggle View">
                            <svg class="icon list-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                            <svg class="icon card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
                        </button>
                        <button class="icon-btn expand-btn" onclick="toggleExpand('news-box')" title="Expand">
                            <svg class="icon expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                        </button>
                    </div>
                </div>
                <div id="global-wire-feed" class="feed-container view-card">
                    <div class="loader">Accessing data...</div>
                </div>
            </div>
        </div>

        <!-- Reddit Widget -->
        <div class="widget-box" id="reddit-box">
            <div class="glass-panel">
                <div class="overlay-controls">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('news', this)">News</button>
                        <button class="tab-btn" onclick="switchTab('popular', this)">Popular</button>
                        <button class="tab-btn" onclick="switchTab('technology', this)">Tech</button>
                        <button class="tab-btn" onclick="switchTab('singularity', this)">Singularity</button>
                    </div>
                    <div class="actions">
                        <button class="icon-btn toggle-layout-btn showing-list" onclick="toggleLayout('news-feed', this)" title="Toggle View">
                            <svg class="icon list-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                            <svg class="icon card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
                        </button>
                        <button class="icon-btn expand-btn" onclick="toggleExpand('reddit-box')" title="Expand">
                            <svg class="icon expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                        </button>
                    </div>
                </div>
                <div id="news-feed" class="feed-container view-list">
                    <div class="loader">Loading updates...</div>
                </div>
            </div>
        </div>

        <!-- Stock Tile -->
        <div class="widget-box" id="stock-box">
            <div class="glass-panel">
                <div class="overlay-controls end">
                    <button class="icon-btn expand-btn" onclick="toggleExpand('stock-box')" title="Expand">
                        <svg class="icon expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                    </button>
                </div>
                <div id="stock-container" class="feed-container" style="padding: 0; overflow: hidden;"></div>
            </div>
        </div>

        <!-- Crypto Tile -->
        <div class="widget-box" id="crypto-box">
            <div class="glass-panel">
                <div class="overlay-controls end">
                    <button class="icon-btn expand-btn" onclick="toggleExpand('crypto-box')" title="Expand">
                        <svg class="icon expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                    </button>
                </div>
                <div id="crypto-container" class="feed-container" style="padding: 0; overflow: hidden;"></div>
            </div>
        </div>

    </main>

    <script>
        const fallbackImages = [
            'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1495020689067-958852a7765e?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1526470608159-0097f4802100?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=400&q=80',
            'https://images.unsplash.com/photo-1557428894-56bcc97113fe?auto=format&fit=crop&w=400&q=80'
        ];

        function getValidImage(url, index) {
            if (url && typeof url === 'string' && url.trim() !== '' && url !== 'null' && !url.includes('placeholder')) {
                return url;
            }
            return fallbackImages[index % fallbackImages.length];
        }

        if (window.innerWidth < 768) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
                        const targetDot = document.querySelector(`.dot[data-target="${entry.target.id}"]`);
                        if (targetDot) targetDot.classList.add('active');
                    }
                });
            }, { threshold: 0.5, root: document.getElementById('scroll-container') });
            document.querySelectorAll('.widget-box').forEach(box => observer.observe(box));
        }

        const expandIcon = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`;
        const closeIcon = `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

        function toggleExpand(boxId) {
            const box = document.getElementById(boxId);
            const overlay = document.getElementById('overlay');
            const btn = box.querySelector('.expand-btn');
            
            if (box.classList.contains('expanded')) {
                box.classList.remove('expanded');
                overlay.classList.remove('active');
                btn.innerHTML = expandIcon;
            } else {
                document.querySelectorAll('.widget-box.expanded').forEach(w => {
                    w.classList.remove('expanded');
                    w.querySelector('.expand-btn').innerHTML = expandIcon;
                });
                box.classList.add('expanded');
                overlay.classList.add('active');
                btn.innerHTML = closeIcon;
            }
        }

        document.getElementById('overlay').addEventListener('click', () => {
            document.querySelectorAll('.widget-box.expanded').forEach(w => {
                w.classList.remove('expanded');
                w.querySelector('.expand-btn').innerHTML = expandIcon;
            });
            document.getElementById('overlay').classList.remove('active');
        });

        function toggleLayout(feedId, btn) {
            const feed = document.getElementById(feedId);
            if (feed.classList.contains('view-card')) {
                feed.classList.remove('view-card');
                feed.classList.add('view-list');
                btn.classList.remove('showing-card');
                btn.classList.add('showing-list');
            } else {
                feed.classList.remove('view-list');
                feed.classList.add('view-card');
                btn.classList.remove('showing-list');
                btn.classList.add('showing-card');
            }
        }

        let currentTheme = 'dark';
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            currentTheme = body.classList.contains('light-theme') ? 'light' : 'dark';
            loadTradingViewWidgets();
        }

        function loadTradingViewWidgets() {
            const configTpl = {
                "blockSize": "market_cap_basic",
                "locale": "en",
                "symbolUrl": "",
                "colorTheme": currentTheme,
                "hasTopBar": false,
                "isDataSetEnabled": false,
                "isZoomEnabled": true,
                "hasSymbolTooltip": true,
                "isMonoSize": false,
                "width": "100%",
                "height": "100%"
            };
            const stockContainer = document.getElementById('stock-container');
            stockContainer.innerHTML = '<div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div></div>';
            const stockScript = document.createElement('script');
            stockScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js';
            stockScript.async = true;
            stockScript.innerHTML = JSON.stringify({ ...configTpl, "dataSource": "SPX500", "blockColor": "change", "grouping": "sector", "exchanges": [] });
            stockContainer.querySelector('.tradingview-widget-container').appendChild(stockScript);

            const cryptoContainer = document.getElementById('crypto-container');
            cryptoContainer.innerHTML = '<div class="tradingview-widget-container"><div class="tradingview-widget-container__widget"></div></div>';
            const cryptoScript = document.createElement('script');
            cryptoScript.src = 'https://s3.tradingview.com/external-embedding/embed-widget-crypto-coins-heatmap.js';
            cryptoScript.async = true;
            cryptoScript.innerHTML = JSON.stringify({ ...configTpl, "dataSource": "Crypto", "blockSize": "market_cap_calc", "blockColor": "24h_close_change|5" });
            cryptoContainer.querySelector('.tradingview-widget-container').appendChild(cryptoScript);
        }

        let weatherString = "";
        async function fetchWeather() {
            const fetchMeteo = async (latitude, longitude, cityName) => {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    weatherString = ` | ${cityName}, ${Math.round(data.current_weather.temperature)}°C`;
                    updateClock(); 
                } catch (err) {
                    weatherString = ` | ${cityName}, --°C`;
                    updateClock();
                }
            };

            const attemptGeoLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        let city = "Local";
                        try {
                            const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                            if (geoRes.ok) {
                                const geoData = await geoRes.json();
                                city = geoData.address.city || geoData.address.town || geoData.address.village || city;
                            }
                        } catch (e) {}
                        fetchMeteo(pos.coords.latitude, pos.coords.longitude, city);
                    }, () => {
                         weatherString = " | Loc. Disabled";
                         updateClock();
                    });
                }
            };

            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                if (ipRes.ok) {
                    const ipData = await ipRes.json();
                    if (ipData.latitude && ipData.city) {
                        fetchMeteo(ipData.latitude, ipData.longitude, ipData.city);
                    } else { attemptGeoLocation(); }
                } else { attemptGeoLocation(); }
            } catch (e) { attemptGeoLocation(); }
        }

        function updateClock() {
            const now = new Date();
            const datePart = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
            const timePart = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }).toUpperCase();
            document.getElementById('datetime-weather').innerText = `${datePart}, ${timePart}${weatherString}`;
        }
        
        setInterval(updateClock, 1000);
        updateClock();
        fetchWeather();

        const USER = 'gowthamnair';
        const REPO = 'CatchUp';

        // Unified rendering mechanism
        function generateArticlesHTML(articles, sourceLabel) {
            const seenImages = new Set();
            return articles.map((item, index) => {
                let isValidImg = getValidImage(item.image, index);
                if (isValidImg && !isValidImg.includes('unsplash')) {
                    if (seenImages.has(isValidImg)) isValidImg = fallbackImages[index % fallbackImages.length];
                    else seenImages.add(isValidImg);
                }
                const fallbackAttr = `onerror="this.onerror=null; this.src='${fallbackImages[index % fallbackImages.length]}';"`;
                return `
                <a href="${item.link}" target="_blank" class="article-item">
                    <div class="img-wrapper"><img src="${isValidImg}" class="article-bg" ${fallbackAttr}></div>
                    <div class="article-overlay"></div>
                    <div class="article-content">
                        <div class="article-meta">${sourceLabel} • ${item.published}</div>
                        <h3 class="article-title">${item.title}</h3>
                    </div>
                </a>`;
            }).join('');
        }

        async function fetchNews(sub) {
            const container = document.getElementById('news-feed');
            try {
                const response = await fetch(`https://${USER}.github.io/${REPO}/${sub}.json?v=${Date.now()}`);
                if (!response.ok) throw new Error();
                const articles = await response.json();
                if (!articles || articles.length === 0) container.innerHTML = '<div class="loader">No posts found.</div>';
                else container.innerHTML = generateArticlesHTML(articles, `r/${sub}`);
            } catch (err) {
                container.innerHTML = `<div class="loader"><p style="color: #ff453a;">Failed to load data</p></div>`;
            }
        }

        function switchTab(sub, btn) {
            const tabs = btn.closest('.tabs').querySelectorAll('.tab-btn');
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('news-feed').innerHTML = '<div class="loader">Loading updates...</div>';
            fetchNews(sub);
        }

        async function fetchGlobalWireNews(source) {
            const container = document.getElementById('global-wire-feed');
            try {
                const response = await fetch(`https://${USER}.github.io/${REPO}/news_${source}.json?v=${Date.now()}`);
                if (!response.ok) throw new Error();
                const articles = await response.json();
                if (!articles || articles.length === 0) container.innerHTML = '<div class="loader">No posts found.</div>';
                else container.innerHTML = generateArticlesHTML(articles.slice(0, 10), source.toUpperCase());
            } catch (err) {
                container.innerHTML = `<div class="loader">Unable to find <b>news_${source}.json</b></div>`;
            }
        }

        function switchGlobalWireTab(source, btn) {
            const tabs = btn.closest('.tabs').querySelectorAll('.tab-btn');
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('global-wire-feed').innerHTML = '<div class="loader">Accessing data...</div>';
            fetchGlobalWireNews(source);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTradingViewWidgets();
            fetchNews('news');
            fetchGlobalWireNews('bbc');
        });
    </script>
</body>
